<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roch_Santé</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Style -->
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <script src="https://kit.fontawesome.com/yourkit.js" crossorigin="anonymous"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container center">
  <div class="card login-card">
    <h2>🔐 Connexion</h2>

    <input type="text" id="username" placeholder="Nom d'utilisateur">
    <input type="password" id="password" placeholder="Mot de passe">

    <button class="primary-btn" onclick="login()">Se connecter</button>

    <p id="error" class="error-text"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <!-- HEADER -->
  <header class="navbar">
    <h1>🏥 Roch_Santé</h1>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </header>

  <!-- MAIN CONTENT -->
  <main class="grid">

    <!-- AJOUT PATIENT -->
    <section class="card">
      <h3>➕ Ajouter un patient</h3>

      <input type="text" id="name" placeholder="Nom complet">
      <input type="number" id="age" placeholder="Âge">

      <select id="status">
        <option>En traitement</option>
        <option>Guéri</option>
        <option>Décédé</option>
      </select>

      <button class="primary-btn" onclick="addPatient()">Ajouter</button>
    </section>

    <!-- LISTE -->
    <section class="card">
      <h3>📋 Liste des patients</h3>
      <ul id="patientList"></ul>
    </section>

    <!-- STATS -->
    <section class="card">
      <h3>📊 Statistiques</h3>
      <canvas id="chart"></canvas>
    </section>

  </main>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
